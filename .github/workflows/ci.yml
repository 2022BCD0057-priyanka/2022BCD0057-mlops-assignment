name: MLOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install dvc[s3] mlflow

    # ✅ Fix: Setup AWS for DVC
    - name: Configure AWS
      run: |
        dvc remote modify myremote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        dvc remote modify myremote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: DVC Pull
      run: dvc pull

    - name: Run Training
      run: python src/train.py

    # ✅ Fix: Create artifacts folder
    - name: Prepare Artifacts
      run: |
        mkdir -p artifacts
        cp metrics.json artifacts/
        cp models/model.pkl artifacts/

    # ✅ Summary (MANDATORY)
    - name: Training Summary
      run: |
        echo "## Training Summary" >> $GITHUB_STEP_SUMMARY
        echo "Name: Priyanka Kumari" >> $GITHUB_STEP_SUMMARY
        echo "Roll No: 2022BCD0057" >> $GITHUB_STEP_SUMMARY
        cat artifacts/metrics.json >> $GITHUB_STEP_SUMMARY

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifacts
        path: artifacts/

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: artifacts
        path: artifacts

    # ✅ Fix: correct metric key
    - name: Read Metrics
      run: |
        python - <<EOF
        import json, os
        with open("artifacts/metrics.json") as f:
            m = json.load(f)
        with open(os.environ["GITHUB_ENV"], "a") as env:
            env.write(f"R2={m['r2']}\n")
        EOF

    - name: Deploy Decision
      run: |
        echo "Deploying model with R2 = $R2"

    # ✅ Docker Login
    - name: Login Docker
      uses: docker/login-action@v3
      with:
        username: 2022bcd0057priyanka
        password: ${{ secrets.DOCKER_TOKEN }}

    # ✅ Build & Push
    - name: Build & Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: 2022bcd0057priyanka/2022bcd0057-mlops:latest